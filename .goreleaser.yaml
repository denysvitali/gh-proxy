version: 2

project_name: gh-proxy

before:
  hooks:
    - go mod tidy

builds:
  - id: gh-proxy
    main: ./cmd/gh-proxy
    binary: gh-proxy
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

dockers:
  - image_templates:
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/denysvitali/gh-proxy"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: amd64
  - image_templates:
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/denysvitali/gh-proxy"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/denysvitali/gh-proxy:{{ .Version }}"
    image_templates:
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-amd64"
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-arm64"
  - name_template: "ghcr.io/denysvitali/gh-proxy:latest"
    image_templates:
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-amd64"
      - "ghcr.io/denysvitali/gh-proxy:{{ .Version }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
