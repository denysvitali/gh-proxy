version: 1
tenants:
  - name: acme
    installation_id: 12345678
    org: acme
    repos:
      - name: app
        access: read
        endpoints: [git.read, actions.workflows]
      - name: infra
        access: write
        endpoints: ["*"]
consumers:
  - id: ci-runner
    tenant: acme
    # Generate with: gh-proxy hash-token --consumer ci-runner
    # The caller presents the full token "<id>.<secret>" as a Bearer token.
    token_hashes:
      - "$2a$10$REPLACE_ME_WITH_BCRYPT_HASH_OF_THE_SECRET"
