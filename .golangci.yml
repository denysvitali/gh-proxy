version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - unconvert
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]

formatters:
  enable:
    - gofmt
    - goimports
